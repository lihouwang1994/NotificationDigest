apply plugin: 'com.android.application'

android {
    namespace 'com.notificationdigest'
    compileSdk 34

    defaultConfig {
        applicationId "com.notificationdigest"
        minSdk 26  // Android 8.0，支持 NotificationListenerService
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // WorkManager（定时任务）
    implementation 'androidx.work:work-runtime:2.9.0'
}
